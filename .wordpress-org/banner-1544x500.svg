<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="roughen">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2a1a0a" stroke-width="1" opacity="0.15"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a0f"/>
      <stop offset="50%" style="stop-color:#111a10"/>
      <stop offset="100%" style="stop-color:#0a1208"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bg)"/>
  <rect width="1544" height="500" fill="url(#hatch)"/>

  <!-- Glow blob behind sheep -->
  <ellipse cx="380" cy="280" rx="320" ry="200" fill="url(#glow)" opacity="0.4"/>

  <!-- Torn edge / grunge splatter marks -->
  <path d="M0,460 Q20,450 15,470 Q35,455 30,480 Q50,460 60,490 Q80,462 100,485 Q120,458 150,480 Q180,455 200,478 Q240,452 260,475 Q300,448 340,470 Q380,445 420,468 Q460,442 500,465 Q550,440 580,462 Q620,436 660,460 Q700,434 740,456 Q780,430 820,452 Q860,426 900,448 Q940,422 980,444 Q1020,418 1060,440 Q1100,414 1140,436 Q1180,410 1220,432 Q1260,406 1300,428 Q1340,402 1380,424 Q1420,398 1460,420 Q1500,394 1544,416 L1544,500 L0,500 Z" fill="#0a1208" opacity="0.8"/>

  <!-- Sheep body (woolly blob) -->
  <g transform="translate(320, 200)">
    <!-- Wool puffs -->
    <circle cx="60" cy="80" r="55" fill="#e8e0d0" filter="url(#roughen)"/>
    <circle cx="120" cy="60" r="60" fill="#ece4d4" filter="url(#roughen)"/>
    <circle cx="180" cy="70" r="52" fill="#e4dcc8" filter="url(#roughen)"/>
    <circle cx="90" cy="110" r="50" fill="#eae2d2" filter="url(#roughen)"/>
    <circle cx="150" cy="105" r="55" fill="#ece4d4" filter="url(#roughen)"/>
    <circle cx="200" cy="90" r="48" fill="#e8e0d0" filter="url(#roughen)"/>
    <!-- Dirty wash over wool -->
    <ellipse cx="130" cy="90" rx="110" ry="70" fill="#2a1a0a" opacity="0.12"/>
    <!-- Head -->
    <rect x="195" y="30" width="65" height="55" rx="12" fill="#2a2018"/>
    <!-- Eyes -->
    <circle cx="215" cy="48" r="5" fill="#111"/>
    <circle cx="245" cy="48" r="5" fill="#111"/>
    <circle cx="216" cy="47" r="2" fill="#fff" opacity="0.6"/>
    <circle cx="246" cy="47" r="2" fill="#fff" opacity="0.6"/>
    <!-- Snout -->
    <ellipse cx="228" cy="68" rx="14" ry="9" fill="#3a2a1a"/>
    <circle cx="223" cy="67" r="3" fill="#1a0e06"/>
    <circle cx="233" cy="67" r="3" fill="#1a0e06"/>
    <!-- Ear -->
    <ellipse cx="197" cy="38" rx="10" ry="16" fill="#2a2018" transform="rotate(-15,197,38)"/>
    <!-- Legs -->
    <rect x="75" y="148" width="20" height="50" rx="5" fill="#2a2018"/>
    <rect x="110" y="152" width="20" height="46" rx="5" fill="#2a2018"/>
    <rect x="155" y="150" width="20" height="48" rx="5" fill="#2a2018"/>
    <rect x="188" y="148" width="20" height="50" rx="5" fill="#2a2018"/>
    <!-- Hooves -->
    <rect x="73" y="192" width="24" height="12" rx="4" fill="#1a1008"/>
    <rect x="108" y="192" width="24" height="12" rx="4" fill="#1a1008"/>
    <rect x="153" y="192" width="24" height="12" rx="4" fill="#1a1008"/>
    <rect x="186" y="192" width="24" height="12" rx="4" fill="#1a1008"/>
    <!-- Score badge on sheep -->
    <rect x="80" y="55" width="90" height="50" rx="8" fill="#16a34a" opacity="0.9"/>
    <text x="125" y="82" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#fff" text-anchor="middle">82</text>
    <text x="125" y="97" font-family="Georgia,serif" font-size="9" fill="#bbf7d0" text-anchor="middle">OVERALL</text>
  </g>

  <!-- Main headline -->
  <text x="780" y="185" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="bold" fill="#f0ebe0" text-anchor="middle" filter="url(#roughen)" letter-spacing="-1">Fricking Local Business</text>
  <text x="780" y="255" font-family="Georgia,'Times New Roman',serif" font-size="62" font-weight="bold" fill="#22c55e" text-anchor="middle" letter-spacing="-1">Insights</text>

  <!-- Subline -->
  <text x="780" y="308" font-family="'Courier New',monospace" font-size="22" fill="#a0b090" text-anchor="middle" letter-spacing="2">SCAN · SCORE · SELL</text>

  <!-- Grunge rule lines -->
  <line x1="560" y1="330" x2="1000" y2="330" stroke="#22c55e" stroke-width="1.5" opacity="0.4" filter="url(#roughen)"/>

  <!-- Feature tags -->
  <g font-family="'Courier New',monospace" font-size="15" fill="#6b8060">
    <text x="620" y="365" text-anchor="middle">AI-SCORED REPORTS</text>
    <text x="780" y="365" text-anchor="middle">·</text>
    <text x="870" y="365" text-anchor="middle">LEAD CAPTURE</text>
    <text x="990" y="365" text-anchor="middle">·</text>
    <text x="1090" y="365" text-anchor="middle">WHITE-LABEL</text>
  </g>

  <!-- Grain overlay -->
  <rect width="1544" height="500" fill="#000" opacity="0.18" filter="url(#grain)"/>

  <!-- Stamp / badge -->
  <g transform="translate(1380,60)">
    <circle r="55" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.6"/>
    <text y="-14" font-family="'Courier New',monospace" font-size="9" fill="#22c55e" text-anchor="middle" letter-spacing="3">WORDPRESS</text>
    <text y="2" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#22c55e" text-anchor="middle">FREE</text>
    <text y="18" font-family="'Courier New',monospace" font-size="9" fill="#22c55e" text-anchor="middle" letter-spacing="3">PLUGIN</text>
  </g>
</svg>
